{% extends 'base.html' %}
{% block title %}Iniciar Sesión — TicketFlow{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-bg">
    <div class="auth-orb orb-1"></div>
    <div class="auth-orb orb-2"></div>
    <div class="auth-orb orb-3"></div>
  </div>

  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">
        <i class="fa-solid fa-ticket"></i>
      </div>
      <h1>TicketFlow</h1>
      <p>Ingresa a tu cuenta para continuar</p>
    </div>

    <form method="POST" action="{{ url_for('auth.login') }}" class="auth-form" id="loginForm">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <div class="input-wrapper">
          <i class="fa-solid fa-envelope input-icon"></i>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="tucorreo@ejemplo.com"
            required
            autocomplete="email"
          />
        </div>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <div class="input-wrapper">
          <i class="fa-solid fa-lock input-icon"></i>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Tu contraseña"
            required
            autocomplete="current-password"
          />
          <button type="button" class="btn-toggle-pwd" id="togglePwd" title="Mostrar/ocultar contraseña">
            <i class="fa-solid fa-eye"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-full" id="btnLogin">
        <i class="fa-solid fa-right-to-bracket"></i>
        Iniciar Sesión
      </button>
    </form>

    <div class="auth-footer">
      <p>¿No tienes cuenta? <a href="{{ url_for('auth.register') }}" id="linkRegister">Regístrate</a></p>
    </div>

    <!-- Demo credentials -->
    <div class="demo-creds">
      <p class="demo-title"><i class="fa-solid fa-circle-info"></i> Cuentas de demo</p>
      <div class="demo-grid">
        <div class="demo-item" onclick="fillCreds('admin@demo.com','admin123')">
          <span class="badge badge-agente"><i class="fa-solid fa-shield-halved"></i> Agente</span>
          <code>admin@demo.com</code>
        </div>
        <div class="demo-item" onclick="fillCreds('ana@demo.com','cliente123')">
          <span class="badge badge-cliente"><i class="fa-solid fa-user"></i> Cliente</span>
          <code>ana@demo.com</code>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function fillCreds(email, pass) {
  document.getElementById('email').value = email;
  document.getElementById('password').value = pass;
}
document.getElementById('togglePwd').addEventListener('click', function(){
  const pwd = document.getElementById('password');
  const icon = this.querySelector('i');
  if (pwd.type === 'password') {
    pwd.type = 'text';
    icon.className = 'fa-solid fa-eye-slash';
  } else {
    pwd.type = 'password';
    icon.className = 'fa-solid fa-eye';
  }
});
</script>
{% endblock %}
