{% extends 'base.html' %}
{% block title %}Página no encontrada — TicketFlow{% endblock %}

{% block content %}
<div class="auth-page" style="min-height: calc(100vh - 120px); display: flex; align-items: center; justify-content: center;">
  <div class="auth-bg">
    <div class="auth-orb orb-1"></div>
    <div class="auth-orb orb-2"></div>
  </div>

  <div class="auth-card" style="text-align: center; max-width: 450px; padding: 3rem 2rem;">
    <div class="auth-logo" style="background: rgba(220, 38, 38, 0.1); color: #DC2626; margin: 0 auto 1.5rem auto;">
      <i class="fa-solid fa-circle-question"></i>
    </div>
    <h1 style="font-size: 4rem; font-weight: 800; margin: 0; line-height: 1; background: linear-gradient(135deg, #7C3AED, #2563EB); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">404</h1>
    <h2 style="font-size: 1.5rem; font-weight: 700; margin: 1rem 0; color: #1F2937;">Página no encontrada</h2>
    <p style="color: #4B5563; font-size: 0.95rem; line-height: 1.5; margin-bottom: 2rem;">
      Lo sentimos, el recurso que estás buscando no existe o ha sido movido a otra dirección.
    </p>
    <a href="{{ url_for('main.dashboard') }}" class="btn btn-primary btn-full" style="justify-content: center;">
      <i class="fa-solid fa-house"></i>
      Volver al Inicio
    </a>
  </div>
</div>
{% endblock %}
